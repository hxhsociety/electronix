# ── Cargo workspace configuration ──────────────────────────────────────────
# For local development you can uncomment `target-cpu=native` to enable AVX2/FMA
# in the RPIM solver. For release builds (CI) we use a portable baseline so
# the binaries run on any x86-64 v2 CPU (~Sandy Bridge 2011 and later).

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-cpu=x86-64-v2"]

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=x86-64-v2"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=x86-64-v2"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "target-cpu=apple-m1"]
