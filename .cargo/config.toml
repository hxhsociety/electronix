# ── Cargo workspace configuration ──────────────────────────────────────────
# Enable native CPU optimisations (AVX2 + FMA) for the RPIM solver's
# RBF inner loops.  Omit when cross-compiling for a different target.

[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-cpu=native"]
# MSVC toolchain paths — set after VS 2026 Build Tools installation
# These ensure cargo finds link.exe + Windows SDK libs even without vcvarsall
linker = "C:\\Program Files (x86)\\Microsoft Visual Studio\\18\\BuildTools\\VC\\Tools\\MSVC\\14.50.35717\\bin\\Hostx64\\x64\\link.exe"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "target-cpu=native"]
